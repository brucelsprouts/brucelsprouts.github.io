<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- subtle radial glow behind sun -->
    <radialGradient id="glow" cx="108" cy="90" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Corner bracket — top left -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <polyline points="48,48 48,80 80,80"/>
  </g>
  <!-- Corner bracket — bottom right -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <polyline points="1152,582 1152,550 1120,550"/>
  </g>
  <!-- Corner bracket — top right -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" fill="none">
    <polyline points="1152,48 1152,80 1120,80"/>
  </g>
  <!-- Corner bracket — bottom left -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" fill="none">
    <polyline points="48,582 48,550 80,550"/>
  </g>

  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Sun icon — top left -->
  <g transform="translate(60, 52)" stroke="#ffffff" fill="none">
    <circle cx="48" cy="48" r="14" fill="#ffffff"/>
    <!-- rays -->
    <line x1="48" y1="16" x2="48" y2="28" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="48" y1="68" x2="48" y2="80" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="16" y1="48" x2="28" y2="48" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="68" y1="48" x2="80" y2="48" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="25.4" y1="25.4" x2="33.9" y2="33.9" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="62.1" y1="62.1" x2="70.6" y2="70.6" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="70.6" y1="25.4" x2="62.1" y2="33.9" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="25.4" y1="70.6" x2="33.9" y2="62.1" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Eyebrow label -->
  <text x="60" y="200" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="22" fill="#ffffff" fill-opacity="0.38" letter-spacing="4">// brucelsprouts.com</text>

  <!-- Main name -->
  <text x="60" y="310" font-family="'Space Grotesk', 'Arial', sans-serif" font-size="110" font-weight="700" fill="#ffffff" letter-spacing="-2">Bruce Lin</text>

  <!-- Tagline -->
  <text x="64" y="382" font-family="'Space Grotesk', 'Arial', sans-serif" font-size="30" font-weight="300" fill="#ffffff" fill-opacity="0.55" letter-spacing="0.5">Developer &amp; CS Student at Western</text>

  <!-- Divider line -->
  <line x1="60" y1="430" x2="440" y2="430" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Stack tags row -->
  <g font-family="'Share Tech Mono', 'Courier New', monospace" font-size="17" fill="#ffffff" fill-opacity="0.45" letter-spacing="1">
    <text x="60"  y="465">Code</text>
    <text x="138" y="465">Video</text>
    <text x="218" y="465">Blender</text>
  </g>

  <!-- Bottom right URL label -->
  <text x="1140" y="590" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="18" fill="#ffffff" fill-opacity="0.25" text-anchor="end" letter-spacing="2">brucelsprouts.com</text>
</svg>
